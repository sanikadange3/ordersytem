<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OrderEase | Login</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="icon" href="data:,">
    <style>
        .auth-container {
            max-width: 400px;
            margin: 4rem auto;
        }

        .auth-toggle {
            text-align: center;
            margin-top: 1rem;
            color: var(--text-secondary);
            font-size: 0.9rem;
            cursor: pointer;
        }

        .auth-toggle:hover {
            color: var(--text-primary);
            text-decoration: underline;
        }
    </style>
</head>

<body>
    <div class="container auth-container">
        <header>
            <h1><i class="fa-solid fa-truck-fast"></i> OrderEase</h1>
            <p>Streamlining your delivery operations</p>
        </header>

        <div class="glass-panel" id="authPanel">
            <h2 id="authTitle" style="margin-bottom: 2rem; font-weight: 700;">Sign In</h2>
            <form id="authForm">
                <div class="form-group">
                    <label>Email Address</label>
                    <input type="email" id="email" class="form-input" placeholder="admin@orderease.com" required>
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="password" class="form-input" placeholder="••••••••" required>
                </div>
                <div id="registerFields" style="display: none;">
                    <div class="form-group">
                        <label>Full Name</label>
                        <input type="text" id="name" class="form-input" placeholder="John Doe">
                    </div>
                </div>
                <button type="submit" class="btn btn-primary" id="authBtn">Enter Dashboard</button>
            </form>
            <p class="auth-toggle" id="toggleAuth">Need an account? Register here</p>
            <p style="margin-top: 2rem; font-size: 0.8rem; color: var(--text-secondary); text-align: center;">
                &copy; 2026 OrderEase
            </p>
        </div>

    </div>
    <script type="module" src="login.js"></script>
</body>

</html>
